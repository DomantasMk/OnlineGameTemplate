<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    #hud .label { opacity: 0.6; font-size: 12px; }
    #connection-status {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
    .connected { background: rgba(102, 187, 106, 0.2); color: #66bb6a; border: 1px solid rgba(102, 187, 106, 0.3); }
    .disconnected { background: rgba(239, 83, 80, 0.2); color: #ef5350; border: 1px solid rgba(239, 83, 80, 0.3); }
    .connecting { background: rgba(255, 167, 38, 0.2); color: #ffa726; border: 1px solid rgba(255, 167, 38, 0.3); }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">WASD</span> Move</div>
    <div><span class="label">SPACE</span> Jump</div>
    <div id="player-count"></div>
  </div>
  <div id="connection-status" class="connecting">Connecting...</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
